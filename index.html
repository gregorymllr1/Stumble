<script type="application/json" id="cowork-artifact-meta">
{
  "name": "Stumble",
  "schemaVersion": 1,
  "description": "A StumbleUpon-style discovery tool with 250+ hand-curated sites tagged across 12 attributes (interactive, visual, audio, text-heavy, nostalgic, weird, beautiful, scientific, playful, meditative, deep-dive, maker-tool). Thumbs up/down train per-tag weights that bias future stumbles via softmax sampling. 'More like this' gives a one-shot boost toward the current site's tags. Bookmarks, history, ratings, and learned taste persist via localStorage."

  {u:"https://fontsinuse.com",t:"Fonts In Use",d:"A database of typography in the wild. Beautiful, dorky, exhaustive.",c:"a",g:"vbd"},
  {u:"https://www.aiga.org/design-archives",t:"AIGA Design Archives",d:"Decades of award-winning graphic design. The history of the field, browseable.",c:"a",g:"vbdn"},
  {u:"https://defacto2.net",t:"Defacto2",d:"Archive of the early-90s PC scene — cracktros, demos, ANSI art, scene history.",c:"a",g:"nvd"},
  {u:"https://16colo.rs",t:"16colo.rs",d:"The largest archive of ANSI art on the web. Wonderful obscure subculture.",c:"a",g:"nvk"},
  {u:"https://www.mobygames.com",t:"MobyGames",d:"The IMDB of video games. Every game, every credit, every screenshot, since the 70s.",c:"a",g:"nd"},
  {u:"https://archive.org/details/softwarelibrary_msdos",t:"MS-DOS Game Library",d:"Thousands of MS-DOS games playable instantly in your browser. Lost weekends await.",c:"a",g:"inp"},
  {u:"https://www.nga.gov",t:"National Gallery of Art",d:"Washington's collection, online. Strong on European old masters and American art.",c:"a",g:"vbd"},
  {u:"https://dp.la",t:"Digital Public Library of America",d:"A federated portal into libraries, archives, and museums across the U.S.",c:"a",g:"vtd"},
  {u:"https://trove.nla.gov.au",t:"Trove",d:"Australia's national discovery platform for newspapers, photos, maps, and oral histories.",c:"a",g:"tdn"},
  {u:"https://www.si.edu/openaccess",t:"Smithsonian Open Access",d:"Millions of Smithsonian 2D and 3D assets released for free reuse and exploration.",c:"a",g:"vbd"},
  {u:"https://commons.wikimedia.org/wiki/Special:Random",t:"Wikimedia Commons: Random",d:"Jump to a random media file from one of the largest open image archives on earth.",c:"a",g:"vpd"},
  {u:"https://www.hathitrust.org",t:"HathiTrust Digital Library",d:"A massive research-library consortium with millions of digitized volumes.",c:"a",g:"td"},
  {u:"https://www.oldbookillustrations.com",t:"Old Book Illustrations",d:"Curated public-domain engravings and illustrations, ready for reuse in modern projects.",c:"a",g:"vbn"},
  {u:"https://www.archives.gov",t:"US National Archives",d:"Founding documents, presidential papers, military records — democracy's paperwork.",c:"a",g:"td"}
];

// ----- State -----
let activeFilters = new Set(["w", "e", "c", "a"]);
let currentSite = null;
let history = [];
let bookmarks = [];
let weights = {}; // tag -> learned weight
let ratings = {}; // url -> "up" | "down"
let boostTarget = null; // {tags: "iwp"} for next stumble only

// Load persistence
try {
  const b = localStorage.getItem("stumble_v2_bookmarks"); if (b) bookmarks = JSON.parse(b);
  const h = localStorage.getItem("stumble_v2_history"); if (h) history = JSON.parse(h);
  const f = localStorage.getItem("stumble_v2_filters"); if (f) activeFilters = new Set(JSON.parse(f));
  const w = localStorage.getItem("stumble_v2_weights"); if (w) weights = JSON.parse(w);
  const r = localStorage.getItem("stumble_v2_ratings"); if (r) ratings = JSON.parse(r);
} catch(e) {}

if (!(activeFilters instanceof Set)) activeFilters = new Set(Object.keys(CATEGORIES));
activeFilters = new Set([...activeFilters].filter(cat => Object.prototype.hasOwnProperty.call(CATEGORIES, cat)));
if (activeFilters.size === 0) activeFilters = new Set(Object.keys(CATEGORIES));
bookmarks = Array.isArray(bookmarks)
  ? bookmarks.filter(b => b && typeof b.url === "string" && b.url)
  : [];
history = Array.isArray(history)
  ? history.filter(h => h && typeof h.url === "string" && h.url).slice(0, 50)
  : [];
weights = (weights && typeof weights === "object") ? weights : {};
ratings = (ratings && typeof ratings === "object") ? ratings : {};
for (const key of Object.keys(ratings)) {
  if (!key || (ratings[key] !== "up" && ratings[key] !== "down")) {
    delete ratings[key];
  }
}

function persist() {
  try {
    localStorage.setItem("stumble_v2_bookmarks", JSON.stringify(bookmarks));
    localStorage.setItem("stumble_v2_history", JSON.stringify(history.slice(0, 50)));
    localStorage.setItem("stumble_v2_filters", JSON.stringify([...activeFilters]));
    localStorage.setItem("stumble_v2_weights", JSON.stringify(weights));
    localStorage.setItem("stumble_v2_ratings", JSON.stringify(ratings));
  } catch(e) {}
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c]));
}

function tagsOf(site) { return site.g.split(""); }
function tagName(letter) { return TAGS[letter] || letter; }

// ----- Learning math -----
function applyDelta(site, delta) {
  if (delta === 0) return;
  for (const tag of tagsOf(site)) {
    weights[tag] = (weights[tag] || 0) + delta;
  }
}

function setRating(site, newRating) {
  const old = ratings[site.u] || null;
  if (old === newRating) {
    // toggle off
    const oldDelta = old === "up" ? 1 : old === "down" ? -1 : 0;
    applyDelta(site, -oldDelta);
    delete ratings[site.u];
  } else {
    const oldDelta = old === "up" ? 1 : old === "down" ? -1 : 0;
    const newDelta = newRating === "up" ? 1 : newRating === "down" ? -1 : 0;
    applyDelta(site, newDelta - oldDelta);
    ratings[site.u] = newRating;
  }
  persist();
  renderCard();
  renderTaste();
}

function toggleBookmark(site) {
  if (isBookmarked(site.u)) {
    bookmarks = bookmarks.filter(b => b.url !== site.u);
    applyDelta(site, -2);
  } else {
    bookmarks.unshift({ url: site.u, title: site.t, cat: site.c, g: site.g });
    applyDelta(site, 2);
  }
  persist();
  renderCard();
  renderBookmarks();
  renderTaste();
}

function isBookmarked(url) { return bookmarks.some(b => b.url === url); }

// Score a site: sum of its tag weights, plus optional boost overlap.
const TEMPERATURE = 1.2;
function scoreSite(site) {
  let score = 0;
  for (const tag of tagsOf(site)) {
    score += weights[tag] || 0;
  }
  if (boostTarget) {
    const targetSet = new Set(boostTarget.split(""));
    let overlap = 0;
    for (const tag of tagsOf(site)) {
      if (targetSet.has(tag)) overlap++;
    }
    score += overlap * 6;
  }
  return score;
}

let recentlySeen = [];

function stumble() {
  const pool = SITES.filter(s => activeFilters.has(s.c));
  if (pool.length === 0) return;

  const avoidCount = Math.min(10, pool.length - 1);
  const avoidSet = new Set(recentlySeen.slice(-avoidCount).map(s => s.u));
  let candidates = pool.filter(s => !avoidSet.has(s.u));
  if (candidates.length === 0) candidates = pool;

  // Softmax sampling
  const scores = candidates.map(s => scoreSite(s));
  const maxScore = Math.max(...scores);
  const exps = scores.map(s => Math.exp((s - maxScore) / TEMPERATURE));
  const total = exps.reduce((a, b) => a + b, 0);
  let r = Math.random() * total;
  let next = candidates[0];
  for (let i = 0; i < candidates.length; i++) {
    r -= exps[i];
    if (r <= 0) { next = candidates[i]; break; }
  }

  // Clear boost after use
  boostTarget = null;
  document.getElementById("boostBadge").style.display = "none";

  recentlySeen.push(next);
  if (recentlySeen.length > 30) recentlySeen.shift();
  currentSite = next;
  history.unshift({ url: next.u, title: next.t, t: Date.now() });
  if (history.length > 50) history.pop();
  persist();
  renderCard();
  renderStats();
  renderHistory();
  try { window.open(next.u, "_blank", "noopener"); } catch(e) {}
}

function moreLikeThis() {
  if (!currentSite) return;
  boostTarget = currentSite.g;
  document.getElementById("boostBadge").style.display = "inline-block";
  // Auto-stumble on next click; don't fire immediately so user can see the badge
}

// ----- Rendering -----
function renderFilters() {
  const el = document.getElementById("filters");
  el.innerHTML = "";
  Object.entries(CATEGORIES).forEach(([key, name]) => {
    const chip = document.createElement("button");
    chip.className = "chip" + (activeFilters.has(key) ? " active" : "");
    chip.textContent = name;
    chip.onclick = () => {
      if (activeFilters.has(key)) { if (activeFilters.size > 1) activeFilters.delete(key); }
      else activeFilters.add(key);
      renderFilters();
      renderStats();
      persist();
    };
    el.appendChild(chip);
  });
}

function renderStats() {
  const pool = SITES.filter(s => activeFilters.has(s.c)).length;
  const stumbled = history.length;
  document.getElementById("stats").textContent = `${pool} sites in pool · ${SITES.length} total · ${stumbled} stumbled`;
}

function renderCard() {
  const el = document.getElementById("cardArea");
  if (!currentSite) {
    el.innerHTML = `<div class="empty">Hit Stumble to begin your walk.</div>`;
    return;
  }
  const s = currentSite;
  const bm = isBookmarked(s.u);
  const myRating = ratings[s.u] || null;
  const tagPills = tagsOf(s).map(t => `<span class="tag-pill">${tagName(t)}</span>`).join("");
  el.innerHTML = `
    <div class="card">
      <span class="cat-tag cat-${s.c}">${CATEGORIES[s.c]}</span>
      <h2>${escapeHtml(s.t)}</h2>
      <div class="url">${escapeHtml(s.u)}</div>
      <div class="desc">${escapeHtml(s.d)}</div>
      <div class="tag-pills">${tagPills}</div>
      <div class="card-actions">
        <a class="btn btn-primary" href="${s.u}" target="_blank" rel="noopener noreferrer">Visit ↗</a>
        <button class="btn btn-icon ${myRating==="up" ? 'active-up' : ''}" id="upBtn" title="Like — train preferences">👍</button>
        <button class="btn btn-icon ${myRating==="down" ? 'active-down' : ''}" id="downBtn" title="Dislike — train against this">👎</button>
        <button class="btn ${bm ? 'bookmarked' : ''}" id="bmBtn">${bm ? '★ Saved' : '☆ Save'}</button>
        <button class="btn btn-boost" id="moreBtn" title="Next stumble will heavily favor sites with these tags">★ More like this</button>
      </div>
    </div>
  `;
  document.getElementById("upBtn").onclick = () => setRating(s, "up");
  document.getElementById("downBtn").onclick = () => setRating(s, "down");
  document.getElementById("bmBtn").onclick = () => toggleBookmark(s);
  document.getElementById("moreBtn").onclick = moreLikeThis;
}

function renderBookmarks() {
  const el = document.getElementById("bookmarks");
  document.getElementById("bmCount").textContent = bookmarks.length ? `${bookmarks.length} saved` : "";
  if (bookmarks.length === 0) {
    el.innerHTML = `<div class="empty" style="padding:24px;">Hit ☆ Save on any card to bookmark it here.</div>`;
    return;
  }
  el.innerHTML = bookmarks.map((b, i) => `
    <div class="list-item">
      <div class="list-info">
        <a href="${b.url}" target="_blank" rel="noopener noreferrer">${escapeHtml(b.title)}</a>
        <div class="b-url">${escapeHtml(b.url)}</div>
      </div>
      <button class="rm-btn" data-idx="${i}" title="Remove">×</button>
    </div>
  `).join("");
  el.querySelectorAll(".rm-btn").forEach(btn => {
    btn.onclick = () => {
      const idx = parseInt(btn.dataset.idx);
      const bk = bookmarks[idx];
      if (bk && bk.g) {
        // un-apply the +2 weight
        const fakeSite = { url: bk.url, g: bk.g };
        for (const t of bk.g.split("")) weights[t] = (weights[t] || 0) - 2;
      }
      bookmarks.splice(idx, 1);
      persist();
      renderBookmarks();
      renderCard();
      renderTaste();
    };
  });
}

function renderHistory() {
  const el = document.getElementById("history");
  if (history.length === 0) {
    el.innerHTML = `<div class="empty" style="padding:12px;font-size:12px;">No stumbles yet.</div>`;
    return;
  }
  el.innerHTML = history.slice(0, 20).map(h => `
    <div class="list-item" style="padding:8px 12px;">
      <div class="list-info">
        <a href="${h.url}" target="_blank" rel="noopener noreferrer">${escapeHtml(h.title)}</a>
      </div>
    </div>
  `).join("");
}

function renderTaste() {
  const sorted = Object.entries(weights)
    .map(([k, v]) => ({ tag: k, weight: v }))
    .sort((a, b) => b.weight - a.weight);

  const likes = sorted.filter(x => x.weight > 0).slice(0, 4);
  const dislikes = sorted.filter(x => x.weight < 0).slice(-4).reverse();

  const likeEl = document.getElementById("likeTags");
  const dislikeEl = document.getElementById("dislikeTags");

  likeEl.innerHTML = likes.length
    ? likes.map(x => `<span class="taste-pill like">${tagName(x.tag)} <strong>+${x.weight}</strong></span>`).join("")
    : `<span class="taste-pill neutral">No likes yet — hit 👍 on sites you enjoy</span>`;
  dislikeEl.innerHTML = dislikes.length
    ? dislikes.map(x => `<span class="taste-pill dislike">${tagName(x.tag)} <strong>${x.weight}</strong></span>`).join("")
    : `<span class="taste-pill neutral">No dislikes yet</span>`;

  const ratedCount = Object.keys(ratings).length;
  const upCount = Object.values(ratings).filter(r => r === "up").length;
  const downCount = ratedCount - upCount;
  document.getElementById("ratingStat").textContent = `${upCount} ↑ · ${downCount} ↓ · ${bookmarks.length} ★`;
}

document.getElementById("stumbleBtn").onclick = stumble;
document.getElementById("histToggle").onclick = (e) => {
  const h = document.getElementById("history");
  h.classList.toggle("open");
  e.target.textContent = h.classList.contains("open") ? "hide history" : "show recent history";
};
document.getElementById("resetLearning").onclick = () => {
  weights = {};
  ratings = {};
  boostTarget = null;
  document.getElementById("boostBadge").style.display = "none";
  persist();
  renderCard();
  renderTaste();
};

document.addEventListener("keydown", (e) => {
  const tag = e.target.tagName;
  if (e.code === "Space" && tag !== "INPUT" && tag !== "TEXTAREA" && tag !== "BUTTON") {
    e.preventDefault();
    stumble();
  }
});

renderFilters();
renderStats();
renderCard();
renderBookmarks();
renderHistory();
renderTaste();
</script>
</body>
